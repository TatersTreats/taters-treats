<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tater's Treats — Premium Small-Batch Canine Confections</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="taters-treats-premium-small-batch-dog-treats.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="site-header__inner">
      <img src="assets/images/branding/taters-treats-wordmark-premium-small-batch-canine-confections.png" alt="Tater's Treats" class="site-header__logo" />
    </div>
  </header>

  <!-- HERO -->
  <section class="hero" aria-label="Tater's Treats hero">
    <div class="hero__media">
      <img src="assets/images/hero/taters-treats-hero-premium-small-batch-canine-confections.jpg" alt="Woofle product group" class="hero__image" />
      <div class="hero__overlay">
        <h1 class="hero__headline">
          Dogs Deserve<br />
          The Best
        </h1>
      </div>
    </div>
  </section>

  <!-- SHOP INTRO -->
  <section class="shop-intro" aria-label="Shop Introduction">
    <p class="shop-intro__line">Three Flavors.</p>
    <p class="shop-intro__line">Two Sizes.</p>
    <p class="shop-intro__line">One Happy Dog.</p>
  </section>

  <!-- PRODUCT ROW -->
  <section class="product-row" id="products" aria-label="Available Woofle Flavors">
    <!-- Product cards rendered by JS -->
  </section>

  <!-- DOGBOWL -->
  <section class="dogbowl" aria-label="DogBowl™">
    <div class="bowl-frame">
      <p class="bowl-note">Your DogBowl™ is empty.</p>
    </div>
  </section>

  <!-- Scripts -->
  <script src="taters-treats-dogbowl-shopping-experience.js"></script>
</body>
</html>
