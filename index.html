<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tater's Treats | Premium Small-Batch Canine Confections</title>
  <meta name="description" content="Premium small-batch canine confections from Tater's Treats." />
  <link rel="stylesheet" href="/assets/css/taters-treats-premium-small-batch-dog-treats.css" />
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="#top" class="brand">
      <img src="/assets/images/branding/taters-treats-wordmark-premium-small-batch-canine-confections.png" class="brand-mark" />
    </a>
  </div>
</header>

<main id="top">

<section class="hero">
  <div class="hero-overlay"></div>
  <div class="container hero-grid">
    <h1>Dogs Deserve The Best.</h1>
  </div>
</section>

<!-- ✅ NEW MISSION SECTION -->
<section class="mission">
  <div class="container mission-inner">
    <p>
      At Tater’s Treats, we believe dogs deserve the same quality, care, and craftsmanship as anything we make for ourselves.
    </p>
  </div>
</section>

<section id="shop" class="shop section">
  <div class="container shop-layout">

    <section class="shop-main">

      <!-- ✅ UPDATED HEADLINE -->
      <div class="section-head">
        <h2>Three Flavors. Three Sizes. One Happy Dog.</h2>
      </div>

      <div id="products" class="products"></div>
    </section>

    <aside class="dogbowl" id="dogbowl">
      <div class="dogbowl-top">
        <div class="bowl-frame">
          <img id="bowlImage" class="bowl-image" src="/assets/images/dogbowl/dogbowl-empty-state.png" />
        </div>
      </div>

      <div class="dogbowl-body">
        <div id="cartList" class="cart-list"></div>

        <div class="cart-summary">
          <span id="cartCount">0</span>
          <button class="checkout-button" id="checkoutButton">Checkout</button>
          <button class="link-button" id="clearCartButton">Clear</button>
          <div id="cartStatus"></div>
        </div>
      </div>
    </aside>

  </div>
</section>

</main>

<script src="/assets/javascript/taters-treats-dogbowl-shopping-experience.js"></script>
</body>
</html>
