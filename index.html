<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tater's Treats</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <img src="/assets/images/branding/wordmark-clean.png" class="brand-mark" />
  </div>
</header>

<main>

<section class="hero">
  <div class="hero-content">
    <h1>Dogs Deserve The Best.</h1>
    <p>Small-batch WOOFLES™ made with real ingredients.</p>
    <button onclick="scrollToShop()">Fill Your DogBowl™</button>
  </div>
</section>

<section id="shop" class="shop">
  <div class="shop-layout">

    <!-- DogBowl -->
    <div class="dogbowl">
      <h3>Your DogBowl™</h3>
      <img id="bowlImage" src="/assets/images/dogbowl/empty-bowl.png" />
      <div id="cart"></div>
      <button onclick="checkout()">Secure Your DogBowl™</button>
    </div>

    <!-- Products -->
    <div id="products" class="products"></div>

  </div>
</section>

</main>

<script src="app.js"></script>
</body>
</html>
