<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tater's Treats | Premium Small-Batch Canine Confections</title>
  <link rel="stylesheet" href="/assets/css/taters-treats-premium-small-batch-dog-treats.css" />
</head>

<body>

<header class="site-header">
  <div class="container header-inner">
    <img src="/assets/images/branding/taters-treats-wordmark.png" class="brand-mark" />
  </div>
</header>

<main>

<section id="shop" class="shop section">
  <div class="container shop-layout">

    <!-- LEFT SIDE -->
    <section class="shop-main">

      <div class="section-head">
        <h2>Premium Small-Batch Canine Confections</h2>
      </div>

      <!-- PRODUCTS (DO NOT TOUCH ID) -->
      <div id="products" class="products"></div>

    </section>

    <!-- RIGHT SIDE -->
    <aside class="dogbowl" id="dogbowl">

      <h2>Your bowl, updated live.</h2>

      <div class="bowl-frame">
        <img
          id="bowlImage"
          class="bowl-image"
          src="/assets/images/dogbowl/dogbowl-empty-state.png"
        />
      </div>

      <div id="cartList" class="cart-list"></div>

      <div class="cart-summary">
        <button id="checkoutButton" class="checkout-button">
          Secure Your DogBowl™
        </button>
      </div>

    </aside>

  </div>
</section>

</main>

<script src="/assets/javascript/taters-treats-dogbowl-shopping-experience.js"></script>

</body>
</html>
