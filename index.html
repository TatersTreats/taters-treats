<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tater's Treats</title>
  <link rel="stylesheet" href="assets/css/taters-treats-premium-small-batch-dog-treats.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <h1>TATER'S TREATS</h1>
    <span>CANINE CONFECTIONS</span>
  </header>

  <!-- SHOP SECTION -->
  <section class="shop-section">

    <!-- LEFT: PRODUCTS -->
    <div class="shop-left">

     <div class="section-head">
  <h2>Premium Small-Batch Canine Confections</h2>
</div>

      <div class="products">

        <!-- PRODUCT 1 -->
        <div class="product-card">
          <img src="assets/images/woofle-pb-mint.png" />
          <div class="product-info">
            <h3>Peanut Butter Mint Carob</h3>
            <p class="product-sub">Freshens breath</p>

            <div class="size-group">
              <button class="size-btn">S</button>
              <button class="size-btn active">M</button>
              <button class="size-btn">L</button>
            </div>

            <div class="card-footer">
              <div class="qty">
                <button>-</button>
                <span>1</span>
                <button>+</button>
              </div>
              <button class="add-btn">Add</button>
            </div>
          </div>
        </div>

        <!-- PRODUCT 2 -->
        <div class="product-card">
          <img src="assets/images/woofle-pb-ginger.png" />
          <div class="product-info">
            <h3>Peanut Butter Ginger</h3>
            <p class="product-sub">Warm & nutty</p>

            <div class="size-group">
              <button class="size-btn">S</button>
              <button class="size-btn active">M</button>
              <button class="size-btn">L</button>
            </div>

            <div class="card-footer">
              <div class="qty">
                <button>-</button>
                <span>1</span>
                <button>+</button>
              </div>
              <button class="add-btn">Add</button>
            </div>
          </div>
        </div>

        <!-- PRODUCT 3 -->
        <div class="product-card">
          <img src="assets/images/woofle-pumpkin.png" />
          <div class="product-info">
            <h3>Pumpkin Turmeric</h3>
            <p class="product-sub">Cozy & nourishing</p>

            <div class="size-group">
              <button class="size-btn">S</button>
              <button class="size-btn active">M</button>
              <button class="size-btn">L</button>
            </div>

            <div class="card-footer">
              <div class="qty">
                <button>-</button>
                <span>1</span>
                <button>+</button>
              </div>
              <button class="add-btn">Add</button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- RIGHT: DOG BOWL -->
    <div class="shop-right">
      <div class="bowl-panel">
        <h3>Your bowl, updated live.</h3>
        <img src="assets/images/dogbowl.png" class="bowl-image" />
        <div class="order-summary">
          <p>No items yet</p>
        </div>
        <button class="checkout-btn">Checkout</button>
      </div>
    </div>

  </section>

</body>
</html>
