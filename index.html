<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tater's Treats | Premium Small-Batch Canine Confections</title>
  <meta name="description" content="Premium small-batch canine confections from Tater's Treats. Handcrafted WOOFLES made with bakery-inspired care." />
  <link rel="stylesheet" href="/assets/css/taters-treats-premium-small-batch-dog-treats.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="#top" class="brand">
        <img src="/assets/images/branding/taters-treats-wordmark-premium-small-batch-canine-confections.png" class="brand-mark"/>
      </a>
    </div>
  </header>

  <main id="top">
    <section class="hero"></section>

    <section id="shop" class="shop section">
      <div class="container shop-layout">

        <section class="shop-main">
          <div class="section-head">
            <h2 class="shop-intro-line">Three flavors. Two sizes. One happy dog.</h2>
          </div>
          <div id="products" class="products"></div>
        </section>

        <aside class="dogbowl dogbowl--clean">
          <div class="bowl-frame">
            <img class="bowl-image" src="/assets/images/dogbowl/dogbowl-empty-state.png"/>

            <div class="bowl-inner-target">
              <div class="static-bowl-items"></div>
            </div>

            <div class="bowl-front-mask"></div>
          </div>
        </aside>

      </div>
    </section>
  </main>

  <script src="/assets/javascript/taters-treats-dogbowl-shopping-experience.js"></script>
</body>
</html>
