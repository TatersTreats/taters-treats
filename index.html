<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tater's Treats</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="taters-treats-premium-small-batch-dog-treats.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="site-header__inner">
      <img
        src="assets/images/branding/taters-treats-wordmark-premium-small-batch-canine-confections.png"
        alt="Tater's Treats"
        class="site-header__logo"
      />
    </div>
  </header>

  <!-- HERO -->
  <main class="site-main">
    <section class="hero" aria-label="Tater's Treats hero">
      <div class="hero__media">
        <img
          src="assets/images/hero/taters-treats-hero-premium-small-batch-canine-confections.jpg"
          alt="Woofle product group"
          class="hero__image"
        />
        <div class="hero__overlay">
          <h1 class="hero__headline">
            Dogs Deserve<br />
            The Best
          </h1>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
