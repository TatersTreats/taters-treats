<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tater's Treats | Premium Small-Batch Canine Confections</title>
  <meta name="description" content="Premium small-batch canine confections from Tater's Treats. Handcrafted WOOFLES made with bakery-inspired care." />
  <link rel="stylesheet" href="/assets/css/taters-treats-premium-small-batch-dog-treats.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="#top" class="brand" aria-label="Tater's Treats home">
        <img
          src="/assets/images/branding/taters-treats-wordmark-premium-small-batch-canine-confections.png"
          alt="Tater's Treats Canine Confections"
          class="brand-mark"
        />
      </a>
    </div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="hero-overlay"></div>
      <div class="container hero-grid">
        <div class="hero-content">
          <h1>Dogs Deserve The Best.</h1>
        </div>
      </div>
    </section>

    <section id="shop" class="shop section">
      <div class="container shop-layout">

        <section class="shop-main">
          <div class="section-head">
            <h2 class="shop-intro-line">Three flavors. Two sizes. One happy dog.</h2>
          </div>
          <div id="products" class="products"></div>
        </section>

        <aside class="dogbowl dogbowl--clean" id="dogbowl">
          <div class="dogbowl-top dogbowl-top--clean">
            <div class="bowl-frame">
              <img
                id="bowlImage"
                class="bowl-image"
                src="/assets/images/dogbowl/dogbowl-empty-state.png"
                alt="An empty DogBowl"
              />

              <!-- existing inner -->
              <div class="bowl-inner-target">
                <div class="static-bowl-items"></div>
              </div>

              <!-- front occlusion (no new asset) -->
              <div class="bowl-front-mask"></div>

            </div>

            <p id="bowlNote" class="bowl-note">Your DogBowl™ is waiting.</p>
          </div>

          <div class="dogbowl-body">
            <div id="cartList" class="cart-list"></div>

            <div class="cart-summary">
              <div class="summary-row">
                <span id="cartCount">0</span>
                <span>items</span>
              </div>

              <button class="checkout-button" id="checkoutButton" type="button">
                Checkout
              </button>

              <button class="link-button" id="clearCartButton" type="button">
                Clear
              </button>

              <div id="cartStatus" class="status-message"></div>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script src="/assets/javascript/taters-treats-dogbowl-shopping-experience.js" defer></script>
</body>
</html>
