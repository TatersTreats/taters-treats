<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tater’s Treats</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="header">
  <h1>Tater’s Treats</h1>
  <p>Premium Small-Batch Canine Confections</p>
</header>

<main class="layout">

  <!-- PRODUCTS -->
  <section class="products">

    <div class="product-card" onclick="toggleCard(this)">

      <div class="image-wrap">
        <img src="woofle.png" />
        <div class="shadow"></div>
      </div>

      <h3>Peanut Butter & Ginger</h3>
      <p>Soothes the tummy</p>

      <div class="expand">

        <!-- SIZE -->
        <div class="size">
          <div class="labels">
            <span>S</span><span>M</span><span>L</span>
          </div>

          <div class="slider" data-value="1">
            <div class="track"></div>
            <div class="thumb"></div>
          </div>
        </div>

        <!-- QTY -->
        <div class="qty">
          <button onclick="changeQty(event,-1)">−</button>
          <span>1</span>
          <button onclick="changeQty(event,1)">+</button>
        </div>

        <button class="add" onclick="addToBowl(event,this)">
          Add to DogBowl
        </button>

      </div>

    </div>

  </section>

  <!-- DOGBOWL -->
  <section class="bowl">
    <img id="bowlImage" src="bowl.png" />
    <div id="cartCount">0</div>
    <ul id="cartList"></ul>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
