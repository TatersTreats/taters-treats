<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tater's Treats</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <img src="/assets/images/branding/wordmark-clean.png" class="brand-mark" />
  </div>
</header>

<main>

<!-- HERO -->
<section class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>Dogs Deserve The Best.</h1>
    <p>Small-batch WOOFLES™ made with real ingredients and bakery-style care.</p>
    <button onclick="scrollToShop()">Fill Your DogBowl™</button>
  </div>
</section>

<!-- SHOP -->
<section id="shop" class="shop">

  <!-- DOGBOWL -->
  <div class="dogbowl">
    <h3>Your DogBowl™</h3>
    <img id="bowlImage" src="/assets/images/dogbowl/empty-bowl.png" />
    <p id="bowlNote">Your DogBowl™ is waiting.</p>

    <div id="cart"></div>

    <button class="checkout" onclick="checkout()">Secure Your DogBowl™</button>
  </div>

  <!-- PRODUCTS -->
  <div id="products" class="products"></div>

</section>

<!-- TRUST -->
<div class="trust">
  Small batch • Real ingredients • No artificial additives • Made with care
</div>

</main>

<script src="app.js"></script>
</body>
</html>
