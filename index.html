<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tater’s Treats</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="header">
    <h1>Tater’s Treats</h1>
    <p>Premium Small-Batch Canine Confections</p>
  </header>

  <main>

    <!-- PRODUCTS -->
    <section id="products" class="products">

      <!-- PRODUCT CARD -->
      <div class="product-card" onclick="toggleCard(this)">

        <div class="product-image-wrap">
          <!-- KEEP YOUR EXISTING IMAGE PATH -->
          <img src="images/woofle.png" class="product-image">
          <div class="product-shadow"></div>
        </div>

        <div class="product-info">
          <h3>Peanut Butter & Ginger</h3>
          <p>Soothes the tummy</p>
        </div>

        <div class="product-expand">

          <!-- SIZE SLIDER -->
          <div class="size-section">
            <div class="size-labels">
              <span>S</span>
              <span>M</span>
              <span>L</span>
            </div>

            <div class="slider" data-index="1">
              <div class="slider-track"></div>
              <div class="slider-thumb"></div>
            </div>
          </div>

          <!-- QUANTITY -->
          <div class="qty-section">
            <button onclick="changeQty(event, -1)">−</button>
            <span class="qty">1</span>
            <button onclick="changeQty(event, 1)">+</button>
          </div>

          <!-- ADD -->
          <button class="add-btn" onclick="addToBowl(event)">
            Add to DogBowl
          </button>

        </div>

      </div>

    </section>

    <!-- DOG BOWL -->
    <section class="dogbowl">
      <h2>Your DogBowl</h2>

      <!-- KEEP EXISTING BOWL IMAGE -->
      <img id="bowlImage" src="images/bowl.png" />

      <ul id="cartList"></ul>

      <div id="cartCount">0</div>

      <button id="checkoutButton">Checkout</button>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
