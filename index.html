<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tater's Treats</title>

  <link rel="stylesheet" href="assets/css/taters-treats-premium-small-batch-dog-treats.css" />
</head>

<body>

<!-- HEADER -->
<header class="site-header">
  <img src="assets/images/branding/taters-treats-wordmark.png" class="brand-mark" />
</header>

<!-- HERO -->
<section class="hero">
  <img src="assets/images/hero/woofles-hero.jpg" />
</section>

<!-- SHOP -->
<section class="shop-section">

  <!-- LEFT -->
  <div class="shop-left">

    <div class="section-head">
      <h2>Fill Your Bowl With The Best.</h2>
    </div>

    <!-- PRODUCTS (JS injects cards here) -->
    <div id="products" class="products"></div>

  </div>

  <!-- RIGHT -->
  <div class="shop-right">

    <div class="bowl-panel">

      <img src="assets/images/dogbowl.png" class="bowl-image" />

      <div id="cartList" class="order-summary"></div>

      <button class="checkout-btn">Checkout</button>

    </div>

  </div>

</section>

<script src="assets/javascript/taters-treats-dogbowl-shopping-experience.js"></script>

</body>
</html>
