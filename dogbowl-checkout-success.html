<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DogBowl Checkout Success | Tater's Treats</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #fbf8f3 0%, #f6efe6 100%);
      color: #24392a;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      max-width: 640px;
      width: 100%;
      background: rgba(255,253,250,0.9);
      border: 1px solid rgba(53,83,59,0.1);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(45, 32, 20, 0.12);
      padding: 32px;
      text-align: center;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 4vw, 3rem);
      margin: 0 0 14px;
    }
    p { line-height: 1.6; color: rgba(75,53,40,0.82); }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 22px;
      border-radius: 999px;
      background: #24392a;
      color: #fffdfa;
      text-decoration: none;
      font-weight: 700;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank you for your order.</h1>
    <p>Your DogBowl is on its way to becoming a very good day for your dog.</p>
    <a href="/">Back to Tater's Treats</a>
  </div>
</body>
</html>
